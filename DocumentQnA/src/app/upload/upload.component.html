<mat-card class="input-wrapper">
  <h1>Upload Document</h1>
  <input type="file" (change)="onFileSelected($event)" />
  <button class="upload-button" mat-raised-button color="primary" (click)="upload()" [disabled]="!selectedFile || loading">
    Upload
  </button>

  <p *ngIf="documentId">Document ID: {{ documentId }}</p>
</mat-card>
